<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>電気料金見直しサービス｜無料診断</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: #333;
}

header {
  background: linear-gradient(135deg, #0072ff, #00c6ff);
  color: white;
  text-align: center;
  padding: 60px 20px;
}

header h1 { font-size: 32px; }
header p { font-size: 18px; }

.cta-btn {
  padding: 15px 30px;
  border: none;
  border-radius: 30px;
  background: #ff9800;
  color: white;
  font-size: 18px;
  cursor: pointer;
}

section {
  padding: 50px 20px;
  text-align: center;
}

.features {
  display: flex;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
}

.card {
  background: #f9f9f9;
  padding: 20px;
  border-radius: 10px;
  width: 250px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.choice-area {
  display: none;
  margin-top: 40px;
}

.choice-buttons {
  display: flex;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
}

.choice-btn {
  padding: 20px;
  width: 220px;
  border-radius: 12px;
  border: none;
  font-size: 16px;
  cursor: pointer;
  box-shadow: 0 4px 10px rgba(0,0,0,0.15);
}

.choice-btn:hover {
  transform: translateY(-3px);
}

.enepal { background: #4CAF50; color: white; }
.toumei { background: #2196F3; color: white; }
.tsubasa { background: #9C27B0; color: white; }

footer {
  background: #333;
  color: white;
  text-align: center;
  padding: 20px;
}
</style>
</head>

<body>

<header>
  <h1>電気料金を今すぐ見直し</h1>
  <p>毎月の電気代を最大30%削減</p>
  <button class="cta-btn" onclick="showChoices()">無料診断はこちら</button>
</header>

<section>
  <h2>こんなお悩みありませんか？</h2>
  <p>・電気代が高い<br>・料金が急に上がった<br>・見直し方法がわからない</p>
</section>

<section>
  <h2>サービスの特徴</h2>
  <div class="features">
    <div class="card"><h3>完全無料</h3><p>診断・提案すべて無料</p></div>
    <div class="card"><h3>簡単手続き</h3><p>面倒な作業は不要</p></div>
    <div class="card"><h3>即削減</h3><p>切替後すぐに節約</p></div>
  </div>
</section>

<section class="choice-area" id="choiceArea">
  <h2>電力会社を選択してください</h2>
  <div class="choice-buttons">
    <button class="choice-btn enepal" onclick="go('https://www.enepal.jp/')">エネパル電気</button>
    <button class="choice-btn toumei" onclick="go('https://www.toumei.co.jp/')">東名</button>
    <button class="choice-btn tsubasa" onclick="go('https://tsubasa-denki.jp/')">つばさでんき</button>
  </div>
</section>

<footer>
  <p>© 2026 電気料金見直しサービス</p>
</footer>

<script>
function showChoices() {
  document.getElementById('choiceArea').style.display = 'block';
  document.getElementById('choiceArea').scrollIntoView({ behavior: 'smooth' });
}

function go(url) {
  window.location.href = url;
}
</script>

</body>
</html>
