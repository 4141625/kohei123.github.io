<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>電気料金見直しサービス</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: #333;
}

header {
    background: linear-gradient(135deg, #0072ff, #00c6ff);
    color: white;
    text-align: center;
    padding: 80px 20px;
}

h1 {
    font-size: 36px;
}

.btn {
    margin-top: 20px;
    padding: 15px 40px;
    background: #ffcc00;
    border: none;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
    border-radius: 30px;
}

.section {
    padding: 60px 20px;
    text-align: center;
}

.box {
    max-width: 800px;
    margin: auto;
}

.card {
    display: inline-block;
    width: 250px;
    margin: 10px;
    padding: 20px;
    background: #f5f5f5;
    border-radius: 10px;
}

.highlight {
    color: red;
    font-weight: bold;
}

footer {
    background: #222;
    color: white;
    padding: 20px;
    text-align: center;
}
</style>
</head>

<body>

<header>
    <h1>電気代、まだ高いままですか？</h1>
    <p>今すぐ見直しで月々コスト削減</p>
    <button class="btn" onclick="scrollToForm()">無料相談はこちら</button>
</header>

<div class="section">
    <div class="box">
        <h2>こんなお悩みありませんか？</h2>
        <p>✔ 電気代が高い<br>✔ 見直したいけど面倒<br>✔ よく分からない</p>
    </div>
</div>

<div class="section">
    <h2>選ばれる理由</h2>

    <div class="card">
        <h3>簡単</h3>
        <p>最短5分で完了</p>
    </div>

    <div class="card">
        <h3>安心</h3>
        <p>専門スタッフ対応</p>
    </div>

    <div class="card">
        <h3>お得</h3>
        <p><span class="highlight">最大30%削減</span></p>
    </div>
</div>

<div class="section">
    <h2>お客様の声</h2>
    <p>「毎月1万円安くなりました！」</p>
    <p>「もっと早くやればよかった」</p>
</div>

<div class="section" id="form">
    <h2>無料相談フォーム</h2>
    <input type="text" placeholder="お名前"><br><br>
    <input type="text" placeholder="電話番号"><br><br>
    <button class="btn">送信する</button>
</div>

<footer>
    <p>© 2026 電気サービス</p>
</footer>

<script>
function scrollToForm() {
    document.getElementById("form").scrollIntoView({ behavior: "smooth" });
}
</script>

</body>
</html>
