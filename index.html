<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>電気料金見直しサービス｜無料診断</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: #333;
}

header {
  background: linear-gradient(135deg, #0072ff, #00c6ff);
  color: white;
  text-align: center;
  padding: 60px 20px;
}

header h1 {
  font-size: 32px;
}

header p {
  font-size: 18px;
}

button {
  padding: 15px 30px;
  border: none;
  border-radius: 30px;
  background: #ff9800;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

section {
  padding: 50px 20px;
  text-align: center;
}

.features {
  display: flex;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
}

.card {
  background: #f9f9f9;
  padding: 20px;
  border-radius: 10px;
  width: 250px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.cta {
  background: #0072ff;
  color: white;
}

form {
  max-width: 400px;
  margin: auto;
  text-align: left;
}

input, textarea {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
}

footer {
  background: #333;
  color: white;
  text-align: center;
  padding: 20px;
}
</style>
</head>

<body>

<header>
  <h1>電気料金を今すぐ見直し</h1>
  <p>毎月の電気代を最大30%削減</p>
  <button onclick="showOptions()">無料診断はこちら</button>

<script>
function showOptions() {
  const choice = confirm("電力会社を選択してください\nOK：エネパル電気\nキャンセル：他の選択肢を表示");

  if (choice) {
    window.location.href = "https://www.enepal.jp/";
  } else {
    const second = confirm("OK：東名電気\nキャンセル：つばさでんき");
    if (second) {
      window.location.href = "https://www.toumei.co.jp/";
    } else {
      window.location.href = "https://tsubasa-denki.jp/";
    }
  }
}
</script>
</header>

<section>
  <h2>こんなお悩みありませんか？</h2>
  <p>・電気代が高い<br>・料金が急に上がった<br>・見直し方法がわからない</p>
</section>

<section>
  <h2>サービスの特徴</h2>
  <div class="features">
    <div class="card">
      <h3>完全無料</h3>
      <p>診断・提案すべて無料</p>
    </div>
    <div class="card">
      <h3>簡単手続き</h3>
      <p>面倒な作業は不要</p>
    </div>
    <div class="card">
      <h3>即削減</h3>
      <p>切替後すぐに節約</p>
    </div>
  </div>
</section>

<section>
  <h2>ご利用の流れ</h2>
  <p>①お問い合わせ<br>②ヒアリング<br>③ご提案<br>④切替</p>
</section>

<section class="cta">
  <h2>無料診断フォーム</h2>
  <form>
    <label>お名前</label>
    <input type="text" placeholder="山田 太郎">

    <label>電話番号</label>
    <input type="tel" placeholder="090-xxxx-xxxx">

    <label>メールアドレス</label>
    <input type="email" placeholder="example@mail.com">

    <label>ご相談内容</label>
    <textarea rows="4"></textarea>

    <button type="submit">送信する</button>
  </form>
</section>

<footer>
  <p>© 2026 電気料金見直しサービス</p>
</footer>

</body>
</html>
